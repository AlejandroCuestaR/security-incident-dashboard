{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h3 class="card-title mb-3">Iniciar sesión</h3>
        <p class="text-muted small">Accede con tu cuenta de analista SOC.</p>
        <div id="error" class="alert alert-danger d-none"></div>
        <form id="loginForm">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="email" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="password" required>
          </div>
          <button type="submit" class="btn btn-dark w-100">Entrar</button>
        </form>
        <hr>
        <p class="small text-muted mb-0">
          ¿Sin cuenta? Regístrate vía <code>POST /auth/registro</code> en
          <a href="/docs">la API</a>.
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errorBox = document.getElementById('error');
  errorBox.classList.add('d-none');

  // OAuth2PasswordRequestForm espera datos de formulario (username/password)
  const body = new URLSearchParams();
  body.append('username', document.getElementById('email').value);
  body.append('password', document.getElementById('password').value);

  const res = await fetch('/auth/login', { method: 'POST', body });
  if (!res.ok) {
    errorBox.textContent = 'Credenciales incorrectas';
    errorBox.classList.remove('d-none');
    return;
  }
  const data = await res.json();
  // En un MVP guardamos el token en localStorage; en producción usa cookies httpOnly.
  localStorage.setItem('access_token', data.access_token);
  window.location.href = '/dashboard';
});
</script>
{% endblock %}
